  - {type: variant, offset: 2635, length: 837, content: 省罰小罪乃殺小罪勝大罪因順天阜財懌衆利地右兵是謂五慮順天奉時阜財因敵懌衆勉若利地守隘險阻右兵弓矢禦殳矛守戈㦸助凡五兵五當長以衛短短以救長迭戰則乆皆戰則強見物與侔是謂兩之主固勉若視敵而舉將心心也衆心心也馬牛車兵佚飽力也敎惟豫戰惟節將軍身也卒支也伍指拇也凡戰智也鬪勇也陳巧也用其所欲行其所能廢其不欲不能於敵反是凡戰有天有財有善時日不遷龜勝㣲行是謂有天衆有有因生羙是謂有財人習陳利極物以豫是謂有善人勉及任是謂樂人大軍以固多力以煩堪物簡治見物應卒是謂行豫輕車輕徒弓矢固禦是謂大軍密靜多内力是謂固陳因是進退是謂多力上暇人敎是謂煩陳然有以職是謂堪物因是辨物是謂簡治稱衆因地因敵令陳攻戰守進退止前後序車徒因是謂戰參不服不信不和怠疑厭懾校拄詘頓肆崩緩是謂戰患驕驕懾懾吟嚝虞懼事悔是謂毁折大小堅柔參伍衆寡凢兩是謂戰權凡戰間逺觀邇因時因財貴信惡疑作兵義作事時使人惠見敵靜見亂暇見危難無忘其衆居國惠以信在軍廣以武刃上果以敏居國和在軍灋刃上察居國見好在軍見方刃上見信凡陳行惟䟽戰惟密兵惟雜人教厚靜乃治威利章相守義則人勉慮多成則人服時中服厥次治物旣章目乃明慮旣定心乃強進退無疑見敵無謀聽誅無誰其名無變其旗凡事善則長因古則行誓作章人乃強滅厲祥滅厲之道一曰義被之以信臨之以強成基一天下之形人莫不說是謂兼用其人一曰權成其溢奪其好我自其外使自其内一曰人二曰正三曰辭四曰巧五曰火六曰水七曰兵是謂七政榮利恥死是謂四守容色積威不過改意凡此道也唯仁有親有仁無信反敗厥身人人正正辭辭火火凡戰之道旣作其氣因發其政假之以色道之以辭因懼而戒因欲而事蹈敵制地以職命之是謂戰灋凡人之形由衆之求試以名行必善行之若行不行身以將之若行而行因使勿忘三乃成章人生之宜謂之灋凡治亂之道一曰仁二曰信三曰直四曰一五曰義六曰變七曰尊立法一曰受二曰灋三曰立四曰疾五曰御其服六曰等其色七曰百官宜無淫服凡軍使灋在巳曰専與下畏法曰法軍無小聽戰無小利日成行微曰道凡戰正不符則事専不服則法不相信則一若怠則動之若疑則變之若人不信上則行其不復自古之政也司馬法卷中, WYG: ''}

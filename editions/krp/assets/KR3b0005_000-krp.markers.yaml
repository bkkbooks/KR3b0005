  - {type: variant, offset: 1607, length: 0, content: '', WYG: 牛車兵佚飽力也教惟豫戰惟節将軍身也卒肢也伍指拇也凡戰權也鬭勇也陣巧也用其所欲行其所能廢其不欲不能於敵反是凡戰有天有財有善時日不遷龜勝微行是謂有天衆有有因生美是謂有財人習陳利極物以豫是謂有善人勉及任是謂樂人大軍以固多力以煩堪物簡治見物應卒是謂行豫輕車輕徒弓矢固禦是謂大軍宻静多内力是謂固陣因是進退是謂多力上暇人教是謂煩陣然有以職是謂堪物因是堪物是謂簡治稱衆因地因敵令陣攻戰守進退止前後序車徒因是謂戰參不服不信不和怠疑厭懾枝柱詘煩肆崩緩是謂戰患驕驕懾懾吟嚝虞懼事悔是謂毁折大小堅柔參伍衆寡凡兩是謂戰權凡戰間逺觀邇因時因財貴信惡疑作兵義作事時使人惠見敵静見亂暇見危難無忘其衆居國惠以信在軍廣以武刃上果以敏居國和在軍}

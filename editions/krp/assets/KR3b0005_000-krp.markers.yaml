  - {type: variant, offset: 1605, length: 1, content: 司, WYG: 定爵第三凡戰定爵位著功罪收遊士申教詔訊厥衆求厥技方慮極物變嫌推疑養力索巧因心之動凡戰固衆相利治亂進止服正成耻約法省罰小罪乃殺小罪勝大罪因順天阜財懌衆利地右兵是謂五慮順天奉時阜財因敵懌衆勉若利地守隘險阻右兵弓矢禦殳矛守戈㦸助凡五兵五當長以衛短短以救長迭戰則久皆戰則強見物與侔是謂兩之主固勉若視敵而舉将心心也衆心心也}

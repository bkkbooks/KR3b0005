body:
  text: 司馬法卷上仁本第一古者以仁爲本以義治之之謂正正不獲意則權權出於戰不出於中人是故殺人安人殺之可也攻其國愛其民攻之可也以戰止戰雖戰可也故仁見親義見說智見恃勇見身信見信内得愛焉所以守也外得威焉所以戰也戰道不違時不歷民病所以愛吾民也不加䘮不因㐫所以愛夫其民也冬夏不興師所以兼愛民也故國雖大好戰必亡天下雖安忘戰必危天下旣平天下大愷春嵬秋獮諸侯春振旅秋治兵所以不忘戰也古者逐奔不過百歩縱綏不過三舎是以明其禮也不窮不能而哀憐傷病是以明其義也成列而皷是以明其信也爭義不爭利是以明其義也又能舎服是以明其勇也知終知始是以明其智也六德以時合教以爲民紀之道也自古之政也先王之治順天之道設地之冝官民之德而正名治物立國辨職以爵分禄諸侯說懷海外來服獄弭而兵寢聖德之治也其次賢王制禮樂法度乃作五刑興甲兵以討不義廵狩者方會諸侯考不同其有失命亂常背德逆天之時而危有功之君徧告于諸侯彰明有罪乃告于皇天上帝日月星辰禱于后土四海神祇山川冢杜乃造于先王然後冡宰徴師于諸侯曰某國爲不道征之以某年月日師至于某國會天子正刑冡宰與百官布令於軍曰入罪人之地無暴神祇無行田獵無毁土功無燔牆屋無伐林木無取六畜禾黍器械見其老㓜奉歸勿傷雖遇壯者不校勿敵敵若傷之醫藥歸之旣誅有罪王及諸侯修正其國舉賢立明正復厥職王霸之所以治諸侯者六以土地形諸侯以政令平諸侯以禮信親諸侯以材力說諸侯以謀人維諸侯以兵革服諸侯同患同利以合諸侯比小事大以和諸侯㑹之以發禁者九慿弱犯寡則眚之賊賢害民則伐之暴内陵外則壇之野荒民散則削之負固不服則侵之賊殺其親則正之放弑其君則殘之犯令陵政則杜之外内亂禽獸行則滅之天子之義第二天子之義必純取灋天地而觀於先聖士庶之義必奉於父母而正於君長故雖有明君士不先敎不可用也古之敎民必立貴賤之倫經使不相陵德義不相踰材技不相掩勇力不相犯故力同而意和也古者國容不入軍軍容不入國故德義不相踰上貴不伐之士不伐之士上之器也苟不伐則無求無求則不争國中之聽必得其情軍旅之聽必得其冝故材技不相掩從命爲士上賞犯命爲士上戮故勇力不相犯旣致教其民然後謹選而使之事極修則百官給矣教極省則民興良矣習貫成則民體俗矣教化之至也古者逐奔不逺縱緩不及不逺則難誘不及則難陷以禮爲固以仁爲勝旣勝之後其教可復是以君子貴之也有虞氏戒於國中欲民體其命也夏后氏誓於軍中欲民先成其慮也殷誓於軍門之外欲民先意以行事也周將交刃而誓之以致民志也夏后氏正其德也未用兵之刃故其兵不雜殷義也始用兵之刃矣周力也盡用兵之刃矣夏賞於朝貴善也殷戮於市威不善也周賞於朝戮於市勸君子懼小人也三王彰其德一也兵不雜則不利長兵以衞短兵以守太長則難犯太短則不及太輕則銳銳則易亂太重則鈍鈍則不濟戎車夏后氏曰鈎車先正也殷曰寅車先疾也周曰元戎先良也旂夏后氏玄首人之執也殷白天之義也周黃地之道也章夏后氏以日月尚明也殷以虎白戎也周以龍尚文也師多務威則民詘少威則民不勝上使民不得其義百姓不得其叙技用不得其利牛馬不得其任有司陵之此謂多威多威則民詘上不尊徳而任詐慝不尊道而任勇力不貴用命而貴犯命不貴善行而貴暴行陵之有司此謂少威少威則民不勝軍旅以舒爲主舒則民力足雖交兵致刃徒不趨車不馳逐奔不踰列是以不亂軍旅之固不失行列之政不絶人馬之力遲速不過誠命古者國容不入軍軍容不入國軍容入國則民德廢國容入軍則民德弱故在國言文而語温在朝恭以遜修己以待人不召不至不問不言難進易退在軍抗而立在行遂而果介者不拜兵車不式城上不趨危事不齒故禮與灋表裏也文與武左右也古者賢王明民之德盡民之善故無廢德無簡民賞無所生罰無所試有虞氏不賞不罰而民可用至德也夏賞而不罰至敎也殷罰而不賞至威也周以賞罰德衰也賞不踰時欲民速得爲善之利也罰不遷列欲民速覩爲不善之害也大捷不賞上下皆不伐善上苟不伐善則不驕矣下苟不伐善必亡等矣上下不伐善若此讓之至也大敗不誅上下皆以不善在已上苟以不善在已必悔其過下苟以不善在已必逺其罪上下分惡若此讓之至也古者戍軍三年不興覩民之勞也上下相報若此和之至也得意則愷歌示喜也偃伯靈臺荅民之勞示休也司馬法卷上司馬灋卷下嚴位第四凡戰之道位欲嚴政欲栗力欲窕氣欲閑心欲一凢戰之道等道義立卒伍定行列正縱横察名實立進俯坐進跪畏則密危則坐逺者視之則不畏邇者勿視則不散位下左右下甲坐誓徐行之位逮徒甲籌以輕重振馬譟徒甲畏亦密之跪坐坐伏則膝行而寛誓之起譟鼓而進則以鐸止之銜枚誓糗坐膝行而推之執戮禁顧譟以先之若畏太甚則勿戮殺示以顔色告之以所生循省其職凢三軍人戒分日人禁不息不可以分食方其疑惑可師可服凡戰以力乆以氣勝以固乆以危勝本心固新氣勝以甲固以兵勝凡車以密固徒以坐固甲以重固兵以輕勝人有勝心惟敵之視人有畏心惟畏之視兩心交定兩利若一兩爲之職惟權視之凡戰以輕行輕則危以重行重則無功以輕行重則敗以重行輕則戰故戰相爲輕重舎謹甲兵行陣行列戰謹進止凡戰敬則慊率則服上煩輕上暇重奏鼓輕舒鼔重服膚輕服羙重凡馬車堅甲兵利輕乃重上同無獲上專多死上生多疑上死不勝凡人死愛死怒死威死義死利凡戰之道敎約人輕死道約人死正凡戰若勝若否若天若人凡戰三軍之戒無過三日一卒之警無過分日一人之禁無過皆息凡大善用本其次用末執略守微本末唯權戰也凡勝三軍一人勝凡鼓鼓旌旗鼔車鼓馬鼓徒鼓兵鼓首鼓足鼔兼齊凡戰旣固勿重重進勿盡凡盡危凡戰非陳之難使人可陳難非使可陳難使人可用難非知之難行之難人方有性性州異敎成俗俗州異道化俗凡衆寡旣勝浩否兵不告利甲不告堅車不告固馬不告良衆不自多未獲道凡戰勝則與衆分善若將復戰則重賞罰若使不勝取過在已復戰則誓以居前無復先術勝否勿反是謂正則凡民以仁救以義戰以智决以勇鬪以信專以利勸以功勝故心中仁行中義堪物智也堪大勇也堪乆信也讓以和人以洽自子以不循爭賢以爲人說其心效其力凡戰擊其微靜避其強靜擊其倦勞避其閑窕擊其大懼避其小懼自古之政也用衆第五凡戰之道用寡固用衆治寡利煩衆利正用衆進止用寡進退衆以合寡則逺裹而闕之若分而迭擊寡以待衆若衆疑之則自用之擅利則釋旗迎而反之敵若衆則相衆而受裹敵若寡若畏則避之開之凢戰背風背髙右髙左險歷沛歷圯兼舎環龜凡戰設而觀其作視敵而舉待則循而勿鼔待衆之作攻則屯而伺之凡戰衆寡以觀其變進退以觀其固危而觀其懼靜而觀其怠動而觀其疑襲而觀其治擊其疑加其卒致其屈襲其規因其不避阻其圖奪其慮乗其懼凡從奔勿息敵人或止於路則慮之凢近敵都必有進路退必有返慮凡戰先則弊後則懾息則怠不息亦弊息乆亦反其懾書親絶是謂絶顧之慮選良次兵是謂益人之強棄任節食是謂開人之意自古之政也司馬灋卷下司馬灋卷中定爵第三凡戰定爵位著功罪収遊士申敎詔訊厥衆求厥技方慮極物變嫌推疑養力索巧因心之動凢戰固衆相利治亂進止服正成恥約法省罰小罪乃殺小罪勝大罪因順天阜財懌衆利地右兵是謂五慮順天奉時阜財因敵懌衆勉若利地守隘險阻右兵弓矢禦殳矛守戈㦸助凡五兵五當長以衛短短以救長迭戰則乆皆戰則強見物與侔是謂兩之主固勉若視敵而舉將心心也衆心心也馬牛車兵佚飽力也敎惟豫戰惟節將軍身也卒支也伍指拇也凡戰智也鬪勇也陳巧也用其所欲行其所能廢其不欲不能於敵反是凡戰有天有財有善時日不遷龜勝㣲行是謂有天衆有有因生羙是謂有財人習陳利極物以豫是謂有善人勉及任是謂樂人大軍以固多力以煩堪物簡治見物應卒是謂行豫輕車輕徒弓矢固禦是謂大軍密靜多内力是謂固陳因是進退是謂多力上暇人敎是謂煩陳然有以職是謂堪物因是辨物是謂簡治稱衆因地因敵令陳攻戰守進退止前後序車徒因是謂戰參不服不信不和怠疑厭懾校拄詘頓肆崩緩是謂戰患驕驕懾懾吟嚝虞懼事悔是謂毁折大小堅柔參伍衆寡凢兩是謂戰權凡戰間逺觀邇因時因財貴信惡疑作兵義作事時使人惠見敵靜見亂暇見危難無忘其衆居國惠以信在軍廣以武刃上果以敏居國和在軍灋刃上察居國見好在軍見方刃上見信凡陳行惟䟽戰惟密兵惟雜人教厚靜乃治威利章相守義則人勉慮多成則人服時中服厥次治物旣章目乃明慮旣定心乃強進退無疑見敵無謀聽誅無誰其名無變其旗凡事善則長因古則行誓作章人乃強滅厲祥滅厲之道一曰義被之以信臨之以強成基一天下之形人莫不說是謂兼用其人一曰權成其溢奪其好我自其外使自其内一曰人二曰正三曰辭四曰巧五曰火六曰水七曰兵是謂七政榮利恥死是謂四守容色積威不過改意凡此道也唯仁有親有仁無信反敗厥身人人正正辭辭火火凡戰之道旣作其氣因發其政假之以色道之以辭因懼而戒因欲而事蹈敵制地以職命之是謂戰灋凡人之形由衆之求試以名行必善行之若行不行身以將之若行而行因使勿忘三乃成章人生之宜謂之灋凡治亂之道一曰仁二曰信三曰直四曰一五曰義六曰變七曰尊立法一曰受二曰灋三曰立四曰疾五曰御其服六曰等其色七曰百官宜無淫服凡軍使灋在巳曰専與下畏法曰法軍無小聽戰無小利日成行微曰道凡戰正不符則事専不服則法不相信則一若怠則動之若疑則變之若人不信上則行其不復自古之政也司馬法卷中

body:
  text: 定爵定爵凡戰定爵位著功罪收遊士申教詔訊厥眾求厥技方慮極物變嫌推疑養力索巧因心之動凡戰固眾相利治亂進止服正成恥約法省罰小罪乃殺小罪勝大罪因順天阜財懌眾利地右兵是謂五慮順天奉時阜財因敵懌眾勉若利地守隘險阻右兵弓矢禦殳矛守戈戟助凡五兵五當長以衛短短以救長迭戰則久皆戰則強見物與侔是謂兩之主固勉若視敵而舉將心心也眾心心也馬牛車兵佚飽力也教惟豫戰惟節將軍身也卒支也伍指拇也凡戰智也鬭勇也陳巧也用其所欲行其所能廢其不欲不能於敵反是凡戰有天有財有善時日不遷龜勝微行是謂有天眾有有因生美是謂有財人習陳利極物以豫是謂有善人勉及任是謂樂人大軍以固多力以煩堪物簡治見物應卒是謂行豫輕車輕徒弓矢固禦是謂大軍密靜多內力是謂固陳因是進退是謂多力上暇人教是謂煩陳然有以職是謂堪物因是辨物是謂簡治稱眾因地因敵令陳攻戰守進退止前後序車徒因是謂戰參不服不信不和怠疑厭懾枝拄詘頓肆崩緩是謂戰患驕驕懾懾吟嚝虞懼事悔是謂毀折大小堅柔參伍眾寡凡兩是謂戰權凡戰間遠觀邇因時因財貴信惡疑作兵義作事時使人惠見敵靜見亂暇見危難無忘其眾居國惠以信在軍廣以武刃上果以敏居國和在軍法刃上察居國見好在軍見方刃上見信凡陳行惟䟽戰惟密兵惟雜人教厚靜乃治威利章相守義則人勉慮多成則人服時中服厥次治物既章目乃明慮既定心乃強進退無疑見敵無謀聽誅無誰其名無變其旗凡事善則長因古則行誓作章人乃強滅厲祥滅厲之道一曰義被之以信臨之以強成基一天下之形人莫不說是謂兼用其人一曰權成其溢奪其好我自其外使自其內一曰人二曰正三曰辭四曰巧五曰火六曰水七曰兵是謂七政榮利恥死是謂四守容色積威不過改意凡此道也唯仁有親有仁無信反敗厥身人人正正辭辭火火凡戰之道既作其氣因發其政假之以色道之以辭因懼而戒因欲而事蹈敵制地以職命之是謂戰法凡人之形由眾之求試以名行必善行之若行不行身以將之若行而行因使勿忘三乃成章人生之宜謂之法凡治亂之道一曰仁二曰信三曰直四曰一五曰義六曰變七曰尊立法一曰受二曰法三曰立四曰疾五曰御其服六曰等其色七曰百官宜無淫服凡軍使法在己曰專與下畏法曰法軍無小聽戰無小利日成行微曰道凡戰正不符則事專不服則法不相信則一若怠則動之若疑則變之若人不信上則行其不復自古之政也

body:
  text: 用眾用眾凡戰之道用寡固用眾治寡利煩眾利正用眾進止用寡進退眾以合寡則遠裹而闕之若分而迭擊寡以待眾若眾疑之則自用之擅利則釋旗迎而反之敵若眾則相眾而受裹敵若寡若畏則避之開之凡戰背風背高右高左險歷沛歷圯兼舍環龜凡戰設而觀其作視敵而舉待則循而勿鼓待眾之作攻則屯而伺之凡戰眾寡以觀其變寬而觀其慮進退以觀其固危而觀其懼靜而觀其怠動而觀其疑襲而觀其治擊其疑加其卒致其屈襲其規因其不避阻其圖奪其慮乘其懼凡從奔勿息敵人或止於路則慮之凡近敵都必有進路退必有返慮凡戰先則弊後則懾息則怠不息亦弊息久亦反其懾書親絕是謂絕顧之慮選良次兵是謂益人之強棄任節食是謂開人之意自古之政也

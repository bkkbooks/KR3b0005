body:
  text: 仁本仁本古者以仁為本以義治之之謂正正不獲意則權權出於戰不出於中人是故殺人安人殺之可也攻其國愛其民攻之可也以戰止戰雖戰可也故仁見親義見説智見恃勇見身信見信內得愛焉所以守也外得威焉所以戰也戰道不違時不歷民病所以愛吾民也不加喪不因凶所以愛夫其民也冬夏不興師所以兼愛民也故國雖大好戰必亡天下雖安忘戰必危天下既平天下大愷春嵬秋獮諸侯春振旅秋治兵所以不忘戰也古者逐奔不過百步縱綏不過三舍是以明其禮也不窮不能而哀憐傷病是以明其義也成列而鼓是以明其信也爭義不爭利是以明其義也又能舍服是以明其勇也知終知始是以明其智也六德以時合教以為民紀之道也自古之政也先王之治順天之道設地之宜官民之德而正名治物立國辨職以爵分祿諸侯説懷海外來服獄弭而兵寢聖德之治也其次賢王制禮樂法度乃作五刑以禁民僻乃興甲兵以討不義巡狩者方會諸侯考不同其有失命亂常背德逆天之時而危有功之君遍告于諸侯彰明有罪乃告于皇天上帝日月星辰禱于后土四海神祇山川冢社乃造于先王然後冢宰徵師于諸侯曰某國為不道征之以某年月日師至于某國會天子正刑冢宰與百官布令於軍曰入罪人之地無暴神祇無行田獵無毀土功無燔牆屋無伐林木無取六畜禾黍器械見其老幼奉歸勿傷雖遇壯者不校勿敵敵若傷之醫藥歸之既誅有罪王及諸侯修正其國舉賢立明正復厥職王霸之所以治諸侯者六以土地形諸侯以政令平諸侯以禮信親諸侯以材力説諸侯以謀人維諸侯以兵革服諸侯同患同利以合諸侯比小事大以和諸侯會之以發禁者九憑弱犯寡則眚之賊賢害民則伐之暴內陵外則壇之野荒民散則削之負固不服則侵之賊殺其親則正之放弒其君則殘之犯令陵政則杜之外內亂禽獸行則滅之

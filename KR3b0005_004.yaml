body:
  text: 嚴位嚴位凡戰之道位欲嚴政欲栗力欲窕氣欲間心欲一凡戰之道等道義立卒伍定行列正縱橫察名實立進俯坐進跪畏則密危則坐遠者視之則不畏邇者勿視則不散位下左右下甲坐誓徐行之位逮徒甲籌以輕重振馬譟徒甲畏亦密之跪坐坐伏則膝行而寬誓之起譟鼓而進則以鐸止之銜枚誓具坐膝行而推之執戮禁顧譟以先之若畏太甚則勿戮殺示以顏色告之以所生循省其職凡三軍人戒分日人禁不息不可以分食方其疑惑可師可服凡戰以力久以氣勝以固久以危勝本心固新氣勝以甲固以兵勝凡車以密固徒以坐固甲以重固兵以輕勝人有勝心惟敵之視人有畏心惟畏之視兩心交定兩利若一兩為之職惟權視之凡戰以輕行輕則危以重行重則無功以輕行重則敗以重行輕則戰故戰相為輕重舍謹甲兵行陳行列戰謹進止凡戰敬則慊率則服上煩輕上暇重奏鼓輕舒鼓重服膚輕服美重凡馬車堅甲兵利輕乃重上同無獲上專多死上生多疑上死不勝凡人死愛死怒死威死義死利凡戰之道教約人輕死道約人死正凡戰若勝若否若天若人凡戰三軍之戒無過三日一卒之警無過分日一人之禁無過皆息凡大善用本其次用末執略守微本末唯權戰也凡勝三軍一人勝凡鼓鼓旌旗鼓車鼓馬鼓徒鼓兵鼓首鼓足鼓兼齊凡戰既固勿重重進勿盡凡盡危凡戰非陳之難使人可陳難非使可陳難使人可用難非知之難行之難人方有性性州異教成俗俗州異道化俗凡衆寡既勝若否兵不告利甲不告堅車不告固馬不告良衆不自多未獲道凡戰勝則與衆分善若將復戰則重賞罰若使不勝取過在己復戰則誓以居前無復先術勝否勿反是謂正則凡民以仁救以義戰以智決以勇鬭以信專以利勸以功勝故心中仁行中義堪物智也堪大勇也堪久信也讓以和人以洽自子以不循爭賢以為人說其心效其力凡戰擊其微靜避其強靜擊其倦勞避其間窕擊其大懼避其小懼自古之政也

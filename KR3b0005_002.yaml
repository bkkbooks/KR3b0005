body:
  text: 天子之義天子之義天子之義必純取法天地而觀於先聖士庶之義必奉於父母而正於君長故雖有明君士不先教不可用也古之教民必立貴賤之倫經使不相陵德義不相踰材技不相掩勇力不相犯故力同而意和也古者國容不入軍軍容不入國故德義不相踰上貴不伐之士不伐之士上之器也苟不伐則無求無求則不爭國中之聽必得其情軍旅之聽必得其宜故材技不相掩從命為士上賞犯命為士上戮故勇力不相犯既致教其民然後謹選而使之事極修則百官給矣教極省則民興良矣習貫成則民體俗矣教化之至也古者逐奔不遠縱緩不及不遠則難誘不及則難陷以禮為固以仁為勝既勝之後其教可復是以君子貴之也有虞氏戒於國中欲民體其命也夏后氏誓於軍中欲民先成其慮也殷誓於軍門之外欲民先意以行事也周將交刃而誓之以致民志也夏后氏正其德也未用兵之刃故其兵不雜殷義也始用兵之刃矣周力也盡用兵之刃矣夏賞於朝貴善也殷戮於市威不善也周賞於朝戮於市勸君子懼小人也三王彰其德一也兵不雜則不利長兵以衛短兵以守太長則難犯太短則不及太輕則鋭鋭則易亂太重則鈍鈍則不濟戎車夏后氏曰鉤車先正也殷曰寅車先疾也周曰元戎先良也旗夏后氏玄首人之執也殷白天之義也周黃地之道也章夏后氏以日月尚明也殷以虎白戎也周以龍尚文也師多務威則民詘少威則民不勝上使民不得其義百姓不得其敘技用不得其利牛馬不得其任有司陵之此謂多威多威則民詘上不尊德而任詐慝不尊道而任勇力不貴用命而貴犯命不貴善行而貴暴行陵之有司此謂少威少威則民不勝軍旅以舒為主舒則民力足雖交兵致刃徒不趨車不馳逐奔不踰列是以不亂軍旅之固不失行列之政不絶人馬之力遲速不過誡命古者國容不入軍軍容不入國軍容入國則民德廢國容入軍則民德弱故在國言文而語溫在朝恭以遜修己以待人不召不至不問不言難進易退在軍抗而立在行遂而果介者不拜兵車不式城上不趨危事不齒故禮與法表裏也文與武左右也古者賢王明民之德盡民之善故無廢德無簡民賞無所生罰無所試有虞氏不賞不罰而民可用至德也夏賞而不罰至教也殷罰而不賞至威也周以賞罰德衰也賞不踰時欲民速得為善之利也罰不遷列欲民速覩為不善之害也大捷不賞上下皆不伐善上苟不伐善則不驕矣下苟不伐善必亡等矣上下不伐善若此讓之至也大敗不誅上下皆以不善在己上苟以不善在己必悔其過下苟以不善在己必遠其罪上下分惡若此讓之至也古者戍軍三年不興覩民之勞也上下相報若此和之至也得意則愷歌示喜也偃伯靈臺答民之勞示休也
